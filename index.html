<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Loading ke GunzKapotited | Tako</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #0a0f1e 0%, #0c1222 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, 'Inter', sans-serif;
            padding: 20px;
        }

        .loading-container {
            background: rgba(18, 25, 45, 0.65);
            backdrop-filter: blur(12px);
            border-radius: 64px;
            padding: 2rem 2.5rem;
            width: 100%;
            max-width: 480px;
            text-align: center;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .spinner-area {
            margin: 1.5rem 0 1rem;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .circle-loader {
            width: 110px;
            height: 110px;
        }

        .circle-bg {
            stroke: rgba(255, 255, 255, 0.2);
            stroke-width: 6;
            fill: none;
        }

        .circle-progress {
            stroke: url(#gradientSpinner);
            stroke-width: 7;
            fill: none;
            stroke-linecap: round;
            transition: stroke-dashoffset 0.05s linear;
            filter: drop-shadow(0 0 6px rgba(0, 200, 255, 0.4));
        }

        .percentage-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #a0e9ff);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            font-feature-settings: "tnum";
        }

        .loading-label {
            margin-top: 1rem;
            font-size: 1rem;
            font-weight: 500;
            color: #b3c7ff;
            letter-spacing: 1px;
            background: rgba(255,255,255,0.05);
            display: inline-block;
            padding: 0.4rem 1.2rem;
            border-radius: 40px;
            backdrop-filter: blur(4px);
        }

        .progress-steps {
            margin-top: 18px;
            font-size: 0.9rem;
            font-family: monospace;
            font-weight: 500;
            background: rgba(0,0,0,0.4);
            display: inline-block;
            padding: 5px 16px;
            border-radius: 50px;
            color: #b9e2ff;
        }

        .info-redirect {
            margin-top: 28px;
            font-size: 0.7rem;
            color: #7e8bb6;
            background: rgba(0,0,0,0.3);
            padding: 8px 12px;
            border-radius: 50px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .fade-out {
            animation: fadeOutEffect 0.45s ease forwards;
        }

        @keyframes fadeOutEffect {
            0% { opacity: 1; transform: scale(1); }
            100% { opacity: 0; transform: scale(0.96); visibility: hidden; }
        }

        @keyframes pulseGlow {
            0% { text-shadow: 0 0 0px rgba(0,200,255,0.3);}
            100% { text-shadow: 0 0 8px rgba(0,200,255,0.8);}
        }
        
        .percentage-text {
            animation: pulseGlow 1.2s infinite alternate;
        }
        
        @media (max-width: 500px) {
            .loading-container {
                padding: 1.5rem;
                border-radius: 48px;
            }
            .percentage-text {
                font-size: 1.8rem;
            }
            .circle-loader {
                width: 90px;
                height: 90px;
            }
        }
    </style>
</head>
<body>

<div class="loading-container" id="loadingApp">
    <div class="spinner-area">
        <svg class="circle-loader" viewBox="0 0 120 120">
            <defs>
                <linearGradient id="gradientSpinner" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#3b82f6" />
                    <stop offset="50%" stop-color="#a855f7" />
                    <stop offset="100%" stop-color="#06b6d4" />
                </linearGradient>
            </defs>
            <circle cx="60" cy="60" r="45" class="circle-bg" stroke="rgba(255,255,255,0.2)" stroke-width="6" fill="none"/>
            <circle cx="60" cy="60" r="45" class="circle-progress" stroke="url(#gradientSpinner)" stroke-width="7" fill="none" stroke-linecap="round" transform="rotate(-90 60 60)" />
        </svg>
        <div class="percentage-text" id="percentageDisplay">0%</div>
    </div>
    
    
    <div class="progress-steps" id="progressSteps">
        Loading progress 0% ...
    </div>
    
    <div class="info-redirect">
        <span> otomatis dialihkan dalam <span id="countdownHint">5</span> detik </span>
    </div>
</div>

<script>
    (function() {
        const TARGET_URL = "https://tako.id/GunzKapotited";
        const LOADING_DURATION_MS = 5000; // 5 detik tepat
        
        const circleProgress = document.querySelector('.circle-progress');
        const percentageDisplay = document.getElementById('percentageDisplay');
        const progressStepsSpan = document.getElementById('progressSteps');
        const countdownHintSpan = document.getElementById('countdownHint');
        const loadingContainer = document.getElementById('loadingApp');
        
        const circumference = 2 * Math.PI * 45;
        circleProgress.style.strokeDasharray = circumference;
        
        let currentPercent = 0;
        let intervalId = null;
        let isRedirected = false;
        
        // Fungsi update tampilan berdasarkan persen (0-100)
        function updateDisplay(percent) {
            percent = Math.min(100, Math.max(0, percent));
            percentageDisplay.innerText = `${percent}%`;
            
            // Update lingkaran progress
            const progress = percent / 100;
            const offset = circumference * (1 - progress);
            circleProgress.style.strokeDashoffset = offset;
            
            // Update teks status
            if (percent === 100) {
                progressStepsSpan.innerHTML = `✅ Loading selesai! Mengalihkan... ✅`;
            } else {
                progressStepsSpan.innerHTML = `⏳ Memuat progres ${percent}% ... ⏳`;
            }
            
            // Update countdown (sisa detik)
            const remainingPercent = 100 - percent;
            const remainingSeconds = Math.ceil((remainingPercent / 100) * 5);
            if (countdownHintSpan && percent < 100) {
                countdownHintSpan.innerText = remainingSeconds;
            } else if (percent >= 100) {
                countdownHintSpan.innerText = "0";
            }
        }
        
        // Fungsi redirect dengan efek fade
        function redirectToTarget() {
            if (isRedirected) return;
            isRedirected = true;
            
            if (intervalId) {
                clearInterval(intervalId);
                intervalId = null;
            }
            
            loadingContainer.classList.add('fade-out');
            
            setTimeout(() => {
                window.location.href = TARGET_URL;
            }, 420);
        }
        
        // Mulai loading dengan interval yang tepat
        function startLoading() {
            const startTime = Date.now();
            let lastPercent = 0;
            
            intervalId = setInterval(() => {
                if (isRedirected) {
                    if (intervalId) clearInterval(intervalId);
                    return;
                }
                
                const elapsed = Date.now() - startTime;
                let percent = (elapsed / LOADING_DURATION_MS) * 100;
                
                if (percent >= 100) {
                    // Loading selesai, set ke 100% dan redirect
                    percent = 100;
                    updateDisplay(100);
                    
                    if (intervalId) {
                        clearInterval(intervalId);
                        intervalId = null;
                    }
                    
                    // Redirect setelah 100ms agar user melihat 100% dulu
                    setTimeout(() => {
                        if (!isRedirected) {
                            redirectToTarget();
                        }
                    }, 100);
                    return;
                }
                
                // Update tampilan hanya jika persen berubah (atau setiap interval)
                const newPercent = Math.floor(percent);
                if (newPercent !== lastPercent) {
                    lastPercent = newPercent;
                    updateDisplay(newPercent);
                }
            }, 30); // update setiap 30ms agar animasi halus
        }
        
        // Jalankan loading
        startLoading();
        
        // Fallback: pastikan redirect terjadi setelah 5 detik + sedikit buffer
        const fallbackTimer = setTimeout(() => {
            if (!isRedirected) {
                updateDisplay(100);
                redirectToTarget();
            }
        }, LOADING_DURATION_MS + 300);
        
        // Preconnect ke domain tujuan agar redirect lebih cepat
        const preconnectLink = document.createElement('link');
        preconnectLink.rel = 'preconnect';
        preconnectLink.href = 'https://tako.id';
        document.head.appendChild(preconnectLink);
        
        // Bersihkan timer saat redirect/unload
        window.addEventListener('beforeunload', () => {
            if (intervalId) clearInterval(intervalId);
            if (fallbackTimer) clearTimeout(fallbackTimer);
        });
    })();
</script>
</body>
</html>
