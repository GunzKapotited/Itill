<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>GunzKapotited | Tako</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #0a0f1e 0%, #0c1222 100%);
            font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, 'Inter', sans-serif;
            overflow: hidden;
        }

        /* Loading Screen */
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(145deg, #0a0f1e 0%, #0c1222 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }

        .loading-screen.hide {
            opacity: 0;
            visibility: hidden;
        }

        .loading-container {
            background: rgba(18, 25, 45, 0.65);
            backdrop-filter: blur(12px);
            border-radius: 64px;
            padding: 2rem 2.5rem;
            width: 100%;
            max-width: 480px;
            text-align: center;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .spinner-area {
            margin: 1.5rem 0 1rem;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .circle-loader {
            width: 110px;
            height: 110px;
        }

        .circle-bg {
            stroke: rgba(255, 255, 255, 0.2);
            stroke-width: 6;
            fill: none;
        }

        .circle-progress {
            stroke: url(#gradientSpinner);
            stroke-width: 7;
            fill: none;
            stroke-linecap: round;
            transition: stroke-dashoffset 0.05s linear;
            filter: drop-shadow(0 0 6px rgba(0, 200, 255, 0.4));
        }

        .percentage-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #a0e9ff);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .loading-label {
            margin-top: 1rem;
            font-size: 1rem;
            font-weight: 500;
            color: #b3c7ff;
            letter-spacing: 1px;
            background: rgba(255,255,255,0.05);
            display: inline-block;
            padding: 0.4rem 1.2rem;
            border-radius: 40px;
        }

        .progress-steps {
            margin-top: 18px;
            font-size: 0.9rem;
            font-family: monospace;
            font-weight: 500;
            background: rgba(0,0,0,0.4);
            display: inline-block;
            padding: 5px 16px;
            border-radius: 50px;
            color: #b9e2ff;
        }

        .info-redirect {
            margin-top: 28px;
            font-size: 0.7rem;
            color: #7e8bb6;
            background: rgba(0,0,0,0.3);
            padding: 8px 12px;
            border-radius: 50px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        @keyframes pulseGlow {
            0% { text-shadow: 0 0 0px rgba(0,200,255,0.3);}
            100% { text-shadow: 0 0 8px rgba(0,200,255,0.8);}
        }
        
        .percentage-text {
            animation: pulseGlow 1.2s infinite alternate;
        }

        /* Konten Web Full */
        .content-wrapper {
            width: 100%;
            height: 100vh;
            opacity: 0;
            transition: opacity 0.6s ease;
        }

        .content-wrapper.show {
            opacity: 1;
        }

        .iframe-container {
            width: 100%;
            height: 100%;
            border: none;
            background: #ffffff;
        }

        @media (max-width: 500px) {
            .loading-container {
                padding: 1.5rem;
                border-radius: 48px;
            }
            .percentage-text {
                font-size: 1.8rem;
            }
            .circle-loader {
                width: 90px;
                height: 90px;
            }
        }
    </style>
</head>
<body>

<!-- Loading Screen -->
<div class="loading-screen" id="loadingScreen">
    <div class="loading-container">
        <div class="spinner-area">
            <svg class="circle-loader" viewBox="0 0 120 120">
                <defs>
                    <linearGradient id="gradientSpinner" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#3b82f6" />
                        <stop offset="50%" stop-color="#a855f7" />
                        <stop offset="100%" stop-color="#06b6d4" />
                    </linearGradient>
                </defs>
                <circle cx="60" cy="60" r="45" class="circle-bg" stroke="rgba(255,255,255,0.2)" stroke-width="6" fill="none"/>
                <circle cx="60" cy="60" r="45" class="circle-progress" stroke="url(#gradientSpinner)" stroke-width="7" fill="none" stroke-linecap="round" transform="rotate(-90 60 60)" />
            </svg>
            <div class="percentage-text" id="percentageDisplay">0%</div>
        </div>
        
        <div class="loading-label">
            ⚡ Memuat GunzKapotited ⚡
        </div>
        
        <div class="progress-steps" id="progressSteps">
            Loading progress 0% ...
        </div>
        
        <div class="info-redirect">
            <span>✨</span> Mohon tunggu, sedang memuat halaman <span>🚀</span>
        </div>
    </div>
</div>

<!-- Tempat konten web yang akan ditampilkan (iframe full) -->
<div class="content-wrapper" id="contentWrapper">
    <iframe 
        id="contentIframe"
        class="iframe-container" 
        src="about:blank"
        title="GunzKapotited - Tako"
        sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-modals allow-top-navigation allow-popups-to-escape-sandbox allow-downloads"
        allow="fullscreen; clipboard-read; clipboard-write; encrypted-media; picture-in-picture; payment; autoplay; camera; microphone"
        referrerpolicy="unsafe-url"
        loading="eager"
    ></iframe>
</div>

<script>
    (function() {
        const TARGET_URL = "https://tako.id/GunzKapotited";
        const LOADING_DURATION_MS = 5000; // 5 detik
        
        // Elemen loading
        const loadingScreen = document.getElementById('loadingScreen');
        const circleProgress = document.querySelector('.circle-progress');
        const percentageDisplay = document.getElementById('percentageDisplay');
        const progressStepsSpan = document.getElementById('progressSteps');
        
        // Elemen konten
        const contentWrapper = document.getElementById('contentWrapper');
        const contentIframe = document.getElementById('contentIframe');
        
        const circumference = 2 * Math.PI * 45;
        circleProgress.style.strokeDasharray = circumference;
        
        let intervalId = null;
        let isLoadingComplete = false;
        
        // Fungsi update tampilan loading
        function updateLoadingDisplay(percent) {
            percent = Math.min(100, Math.max(0, percent));
            percentageDisplay.innerText = `${percent}%`;
            
            const progress = percent / 100;
            const offset = circumference * (1 - progress);
            circleProgress.style.strokeDashoffset = offset;
            
            if (percent === 100) {
                progressStepsSpan.innerHTML = `✅ Loading selesai! Menampilkan konten... ✅`;
            } else {
                progressStepsSpan.innerHTML = `⏳ Memuat progres ${percent}% ... ⏳`;
            }
        }
        
        // Fungsi memuat konten iframe
        function loadContent() {
            if (isLoadingComplete) return;
            isLoadingComplete = true;
            
            // Set iframe ke URL tujuan
            contentIframe.src = TARGET_URL;
            
            // Event listener untuk iframe berhasil dimuat
            contentIframe.addEventListener('load', function() {
                // Sembunyikan loading dan tampilkan konten
                loadingScreen.classList.add('hide');
                contentWrapper.classList.add('show');
            });
            
            // Timeout untuk jaga-jaga jika iframe lama loading
            setTimeout(() => {
                if (!loadingScreen.classList.contains('hide')) {
                    loadingScreen.classList.add('hide');
                    contentWrapper.classList.add('show');
                }
            }, 2000);
        }
        
        // Animasi loading progress selama 5 detik
        function startLoading() {
            const startTime = Date.now();
            let lastPercent = 0;
            
            intervalId = setInterval(() => {
                if (isLoadingComplete) {
                    if (intervalId) clearInterval(intervalId);
                    return;
                }
                
                const elapsed = Date.now() - startTime;
                let percent = (elapsed / LOADING_DURATION_MS) * 100;
                
                if (percent >= 100) {
                    percent = 100;
                    updateLoadingDisplay(100);
                    
                    if (intervalId) {
                        clearInterval(intervalId);
                        intervalId = null;
                    }
                    
                    // Setelah loading selesai, muat konten iframe
                    setTimeout(() => {
                        loadContent();
                    }, 150);
                    return;
                }
                
                const newPercent = Math.floor(percent);
                if (newPercent !== lastPercent) {
                    lastPercent = newPercent;
                    updateLoadingDisplay(newPercent);
                }
            }, 30);
        }
        
        // Mulai loading
        startLoading();
        
        // Fallback timer untuk memastikan loading tetap selesai
        const fallbackTimer = setTimeout(() => {
            if (!isLoadingComplete) {
                updateLoadingDisplay(100);
                loadContent();
            }
        }, LOADING_DURATION_MS + 500);
        
        // Preconnect untuk mempercepat loading
        const preconnectLink = document.createElement('link');
        preconnectLink.rel = 'preconnect';
        preconnectLink.href = 'https://tako.id';
        document.head.appendChild(preconnectLink);
        
        // Bersihkan interval dan timer saat unload
        window.addEventListener('beforeunload', () => {
            if (intervalId) clearInterval(intervalId);
            if (fallbackTimer) clearTimeout(fallbackTimer);
        });
    })();
</script>
</body>
</html>
