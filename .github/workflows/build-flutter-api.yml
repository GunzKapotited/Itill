name: Build Flutter APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Unzip source code
      run: |
        if ls *.zip 1> /dev/null 2>&1; then
          echo "Found zip file, extracting..."
          for zipfile in *.zip; do
            echo "Extracting $zipfile..."
            unzip -q -o "$zipfile" -d temp_extract/
            shopt -s dotglob
            cp -rf temp_extract/* ./
            shopt -u dotglob
            rm -rf temp_extract/
            rm -f "$zipfile"
          done
          echo "Extraction complete"
        else
          echo "No zip file found"
        fi
        ls -la
    
    - name: Hapus file dan folder tidak perlu
      run: |
        echo "Menghapus file/folder tidak perlu..."
        rm -rf .dart_tool/ .pub-cache/ build/ .flutter-plugins .flutter-plugins-dependencies .packages
        rm -rf .svn/ .hg/ .idea/ .vscode/ logs/ tmp/ temp/ example/ docs/
        rm -rf .DS_Store Thumbs.db desktop.ini *.bak *.backup *~
        rm -rf ios/ macos/ windows/ linux/ web/  # Hapus platform lain (opsional)
        find . -name "*.psd" -type f -delete
        find . -name "*.ai" -type f -delete
        echo "Bersih! File yang tersisa:"
        ls -la
    
    - name: Auto fix missing files
      run: |
        # Fix missing pubspec.yaml
        if [ ! -f "pubspec.yaml" ]; then
          echo "pubspec.yaml not found! Creating..."
          cat > pubspec.yaml << 'EOF'
        name: my_app
        description: Auto generated app
        version: 1.0.0+1
        environment:
          sdk: ">=3.0.0 <4.0.0"
        dependencies:
          flutter:
            sdk: flutter
        flutter:
          uses-material-design: true
        EOF
        fi
        
        # Fix missing main.dart
        if [ ! -f "lib/main.dart" ]; then
          mkdir -p lib
          cat > lib/main.dart << 'EOF'
        import 'package:flutter/material.dart';
        void main() => runApp(MyApp());
        class MyApp extends StatelessWidget {
          @override
          Widget build(BuildContext context) {
            return MaterialApp(
              title: 'Flutter App',
              home: Scaffold(
                appBar: AppBar(title: Text('Home')),
                body: Center(child: Text('Hello World!')),
              ),
            );
          }
        }
        EOF
        fi
        
        # Fix missing android folder
        if [ ! -d "android" ]; then
          echo "Creating android folder..."
          flutter create --platforms=android . 2>/dev/null || true
        fi
        
        # Fix pubspec.lock corrupt
        if [ -f "pubspec.lock" ] && ! grep -q "sdks:" pubspec.lock 2>/dev/null; then
          rm -f pubspec.lock
        fi
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
        cache: true
    
    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: |
          .pub-cache
          build/
          .dart_tool/
          ~/.gradle/caches/
          android/.gradle/
        key: ${{ runner.os }}-cache-${{ hashFiles('pubspec.yaml') }}
        restore-keys: ${{ runner.os }}-cache-
    
    - name: Fix Gradle config
      run: |
        if [ -f "android/app/build.gradle" ]; then
          sed -i 's/minSdkVersion [0-9]*/minSdkVersion 21/g' android/app/build.gradle
          sed -i 's/compileSdkVersion [0-9]*/compileSdkVersion 34/g' android/app/build.gradle
          sed -i 's/targetSdkVersion [0-9]*/targetSdkVersion 34/g' android/app/build.gradle
          if ! grep -q "namespace" android/app/build.gradle; then
            sed -i '/android {/a \    namespace "com.example.app"' android/app/build.gradle
          fi
        fi
        if [ -f "android/build.gradle" ]; then
          sed -i 's/ext.kotlin_version = .*/ext.kotlin_version = "1.9.0"/' android/build.gradle 2>/dev/null || \
          sed -i '/buildscript {/a \    ext.kotlin_version = "1.9.0"' android/build.gradle
        fi
    
    - name: Auto rebuild & fix loop
      id: build_loop
      run: |
        MAX_ATTEMPTS=5
        ATTEMPT=1
        
        while [ $ATTEMPT -le $MAX_ATTEMPTS ]; do
          echo ""
          echo "========================================="
          echo "Build attempt $ATTEMPT of $MAX_ATTEMPTS"
          echo "========================================="
          
          # Clean before build
          flutter clean
          
          # Get dependencies
          echo "Getting dependencies..."
          flutter pub get || flutter pub get
          
          # Try build
          echo "Building APK..."
          if flutter build apk --release; then
            echo "✅ BUILD SUCCESSFUL on attempt $ATTEMPT!"
            exit 0
          fi
          
          echo "❌ Build failed, attempt $ATTEMPT"
          
          # Auto fix based on error
          flutter build apk --release 2>&1 | tee error.log
          
          echo "🔧 Auto fixing errors..."
          
          # Fix missing file errors
          if grep -q "No such file or directory" error.log; then
            echo "Fixing missing files..."
            flutter create --platforms=android . 2>/dev/null || true
          fi
          
          # Fix pub get errors
          if grep -q "pub get failed" error.log || grep -q "Could not find" error.log; then
            echo "Fixing pub dependencies..."
            rm -f pubspec.lock
            flutter pub get
          fi
          
          # Fix Gradle errors
          if grep -q "Gradle task" error.log || grep -q "compileDebugJavaWithJavac" error.log; then
            echo "Fixing Gradle issues..."
            cd android
            ./gradlew clean 2>/dev/null || true
            cd ..
            rm -rf android/.gradle
          fi
          
          # Fix Java version errors
          if grep -q "Java version" error.log; then
            echo "Fixing Java version..."
            sed -i 's/compileSdkVersion [0-9]*/compileSdkVersion 34/g' android/app/build.gradle
          fi
          
          # Fix Kotlin version errors
          if grep -q "Kotlin" error.log; then
            echo "Fixing Kotlin version..."
            sed -i 's/ext.kotlin_version = .*/ext.kotlin_version = "1.9.0"/' android/build.gradle 2>/dev/null || true
          fi
          
          # Fix missing namespace
          if grep -q "Namespace not specified" error.log; then
            echo "Adding namespace..."
            sed -i '/android {/a \    namespace "com.example.app"' android/app/build.gradle
          fi
          
          # Fix minSdkVersion errors
          if grep -q "minSdkVersion" error.log; then
            echo "Fixing minSdkVersion..."
            sed -i 's/minSdkVersion [0-9]*/minSdkVersion 21/g' android/app/build.gradle
          fi
          
          # Fix merge conflicts
          if grep -q "mergeDebugResources" error.log; then
            echo "Cleaning resources..."
            rm -rf android/app/src/main/res/ 2>/dev/null || true
            flutter create --platforms=android . 2>/dev/null || true
          fi
          
          # Fix dependency conflicts
          if grep -q "dependency" error.log && grep -q "conflict" error.log; then
            echo "Fixing dependencies conflict..."
            flutter pub upgrade --major-versions
          fi
          
          ATTEMPT=$((ATTEMPT + 1))
        done
        
        echo "❌ All $MAX_ATTEMPTS attempts failed!"
        exit 1
    
    - name: Final check - APK exists?
      id: final_check
      run: |
        if [ -f "build/app/outputs/flutter-apk/app-release.apk" ]; then
          echo "✅ APK successfully created!"
          ls -la build/app/outputs/flutter-apk/
          exit 0
        else
          echo "⚠️ APK not found, one last attempt..."
          flutter clean
          flutter pub get
          flutter build apk --release --no-tree-shake-icons
          
          if [ -f "build/app/outputs/flutter-apk/app-release.apk" ]; then
            echo "✅ APK created on final attempt!"
          else
            echo "❌ Failed to create APK"
            exit 1
          fi
        fi
    
    - name: Upload APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: flutter-release-apk
        path: build/app/outputs/flutter-apk/app-release.apk
        retention-days: 30
    
    - name: Upload debug info if failed
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: debug-info
        path: |
          build/
          error.log
          pubspec.yaml
          android/app/build.gradle          ~/.gradle/wrapper/
          android/.gradle/
        key: ${{ runner.os }}-gradle-${{ hashFiles('android/build.gradle', 'android/app/build.gradle') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
    
    - name: Clean and get dependencies
      run: |
        flutter clean
        flutter pub get
    
    - name: Verify setup
      run: |
        flutter --version
        flutter doctor -v
    
    - name: Build APK
      run: flutter build apk --release
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: flutter-release-apk
        path: build/app/outputs/flutter-apk/app-release.apk
        retention-days: 30
