name: Deploy Pterodactyl Panel (Auto Installer)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Setup Docker & Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y docker-compose curl wget git unzip

    - name: Clone Pterodactyl Panel
      run: |
        git clone --depth=1 https://github.com/pterodactyl/panel.git /tmp/panel
        cd /tmp/panel
        cp .env.example .env

    - name: Setup .env
      run: |
        cd /tmp/panel
        sed -i 's/APP_ENV=local/APP_ENV=production/g' .env
        sed -i 's/APP_DEBUG=true/APP_DEBUG=false/g' .env
        sed -i 's/APP_URL=http:\/\/localhost/APP_URL=https:\/\/pterogunz.xonepanel.qzz.io/g' .env
        sed -i 's/DB_HOST=127.0.0.1/DB_HOST=database/g' .env
        sed -i 's/DB_DATABASE=panel/DB_DATABASE=panel/g' .env
        sed -i 's/DB_USERNAME=pterodactyl/DB_USERNAME=pterodactyl/g' .env
        sed -i 's/DB_PASSWORD=/DB_PASSWORD=panelpasswordkuat123/g' .env
        sed -i 's/REDIS_HOST=127.0.0.1/REDIS_HOST=redis/g' .env
        echo "HASHIDS_SALT=saltsangatpanjangdanunik12345" >> .env
        echo "SESSION_DRIVER=redis" >> .env
        echo "SESSION_LIFETIME=120" >> .env

    - name: Create docker-compose.yml
      run: |
        cat > docker-compose.yml << 'EOF'
        version: '3.8'
        
        services:
          database:
            image: mariadb:10.6
            restart: always
            command: --default-authentication-plugin=mysql_native_password
            volumes:
              - ./data/mysql:/var/lib/mysql
            environment:
              MYSQL_ROOT_PASSWORD: rootpasswordkuat123
              MYSQL_DATABASE: panel
              MYSQL_USER: pterodactyl
              MYSQL_PASSWORD: panelpasswordkuat123
            networks:
              - pterodactyl_network

          redis:
            image: redis:alpine
            restart: always
            networks:
              - pterodactyl_network

          panel:
            image: ghcr.io/pterodactyl/panel:latest
            restart: always
            ports:
              - "80:80"
              - "443:443"
            volumes:
              - ./data/panel:/app/storage
              - ./data/ssl:/etc/nginx/ssl
              - ./data/logs:/app/storage/logs
              - /tmp/panel:/app
            working_dir: /app
            environment:
              APP_ENV: production
              APP_DEBUG: 'false'
              APP_URL: https://pterogunz.xonepanel.qzz.io
              APP_TIMEZONE: Asia/Jakarta
              APP_SERVICE_AUTHOR: admin@xonepanel.qzz.io
              DB_HOST: database
              DB_PORT: 3306
              DB_DATABASE: panel
              DB_USERNAME: pterodactyl
              DB_PASSWORD: panelpasswordkuat123
              REDIS_HOST: redis
              REDIS_PORT: 6379
              HASHIDS_SALT: saltsangatpanjangdanunik12345
              SESSION_DRIVER: redis
              SESSION_LIFETIME: 120
              TRUSTED_PROXIES: "103.21.244.0/22,103.22.200.0/22,103.31.4.0/22,104.16.0.0/13,104.24.0.0/14,108.162.192.0/18,131.0.72.0/22,141.101.64.0/18,162.158.0.0/15,172.64.0.0/13,173.245.48.0/20,188.114.96.0/20,190.93.240.0/20,197.234.240.0/22,198.41.128.0/17"
            depends_on:
              - database
              - redis
            networks:
              - pterodactyl_network
            command: >
              sh -c "php artisan key:generate --force &&
                     php artisan migrate --seed --force &&
                     php artisan p:user:make --email=admin@xonepanel.qzz.io --username=admin --name=Administrator --password=AdminPassword123! --force &&
                     php artisan serve --host=0.0.0.0 --port=80"

          wings:
            image: ghcr.io/pterodactyl/wings:latest
            restart: always
            privileged: true
            volumes:
              - /var/run/docker.sock:/var/run/docker.sock
              - /var/lib/docker/containers:/var/lib/docker/containers
              - ./data/wings:/etc/pterodactyl
              - /tmp/pterodactyl:/tmp/pterodactyl
              - /var/lib/pterodactyl/volumes:/var/lib/pterodactyl/volumes
            environment:
              WINGS_UID: 988
              WINGS_GID: 988
              TZ: Asia/Jakarta
            networks:
              - pterodactyl_network
            depends_on:
              - panel
            ports:
              - "8080:8080"
              - "8443:8443"

          cloudflared:
            image: cloudflare/cloudflared:latest
            restart: always
            command: tunnel run --token eyJhIjoiY2FkNjFhM2UyYzk5Y2NiN2IwNTQ2MmU0MWY1N2JjNTYiLCJ0IjoiN2E1YWI3ZGMtZTdlYy00NWIwLTllM2YtMTczYTE4YzEwODQ2IiwicyI6Ill6SmpPV0l3TURNdFl6RmtaQzAwWVRRMkxUbG1NR1F0TTJRMFpUTmpabU5tTVRsbCJ9
            networks:
              - pterodactyl_network
            depends_on:
              - panel
              - wings

        networks:
          pterodactyl_network:
            driver: bridge
        EOF

    - name: Start containers
      run: |
        docker-compose up -d
        sleep 45

    - name: Setup Wings Node
      run: |
        echo "========================================="
        echo "🔥 SETUP WINGS NODE..."
        echo "========================================="
        
        docker-compose exec -T panel php artisan p:node:make \
          --name="Main-Node" \
          --description="Auto deployed node" \
          --fqdn="localhost" \
          --public=1 \
          --scheme="https" \
          --master=1 \
          --port=8080 \
          --daemon-port=8443 \
          --memory=8192 \
          --disk=51200 \
          --upload-size=100 \
          --force
        
        sleep 10
        docker-compose exec -T panel php artisan p:node:configuration 1 > ./data/wings/config.yml
        docker-compose restart wings
        sleep 15

    - name: Keep Alive
      run: |
        echo "=========================================="
        echo "✅ PTERODACTYL PANEL READY!"
        echo "=========================================="
        echo "🌐 URL: https://pterogunz.xonepanel.qzz.io"
        echo "👤 Username: admin"
        echo "🔑 Password: AdminPassword123!"
        echo "=========================================="
        echo "🖥️  Wings: CONNECTED"
        echo "☁️  Cloudflared: ACTIVE"
        echo "=========================================="
        
        while true; do
          echo "⏰ $(date)"
          echo "------------------------------------------"
          docker-compose ps
          echo "------------------------------------------"
          echo "📡 Panel Log:"
          docker-compose logs --tail=3 panel
          echo "------------------------------------------"
          echo "☁️  Cloudflared Log:"
          docker-compose logs --tail=3 cloudflared
          echo "------------------------------------------"
          sleep 30
        done
