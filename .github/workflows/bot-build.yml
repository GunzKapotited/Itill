name: Flutter Auto Detect Build + Session Backup

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

concurrency:
  group: flutter-builder
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:

    - name: Checkout
      uses: actions/checkout@v4

    - name: Extract Bot Zip
      run: |
        # Cek apakah ada file zip di repository
        if ls *.zip 2>/dev/null | grep -v "session-backup.zip" | head -1; then
          ZIP_FILE=$(ls *.zip 2>/dev/null | grep -v "session-backup.zip" | head -1)
          echo "Found zip file: $ZIP_FILE"
          
          # Ekstrak zip
          unzip -o "$ZIP_FILE" -d extracted_bot/
          
          # Pindahkan hasil ekstrak ke root
          cp -rf extracted_bot/* . 2>/dev/null || true
          cp -rf extracted_bot/.* . 2>/dev/null || true
          
          echo "Bot zip extracted successfully"
          rm -f "$ZIP_FILE"
          rm -rf extracted_bot
        else
          echo "No bot zip file found"
        fi

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          git \
          curl \
          wget \
          unzip \
          zip \
          build-essential \
          libglu1-mesa \
          libgtk-3-dev \
          ninja-build \
          cmake

    - name: Install Node.js (if needed)
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install Python Dependencies (if needed)
      run: |
        sudo apt-get install -y python3 python3-pip
        pip3 install --upgrade pip

    - name: Detect Flutter SDK
      id: flutter
      shell: bash
      run: |

        SDK=$(grep -A2 "environment:" pubspec.yaml | grep sdk | sed 's/.*"\(.*\)".*/\1/' || true)

        echo "Detected Dart SDK: $SDK"

        if [[ "$SDK" == *"3.0"* ]]; then
          VERSION="3.10.0"

        elif [[ "$SDK" == *"3.1"* ]]; then
          VERSION="3.13.0"

        elif [[ "$SDK" == *"3.2"* ]]; then
          VERSION="3.16.0"

        elif [[ "$SDK" == *"3.3"* ]]; then
          VERSION="3.19.0"

        elif [[ "$SDK" == *"3.4"* ]]; then
          VERSION="3.22.0"

        else
          VERSION="3.22.3"
        fi


        echo "Flutter version selected: $VERSION"

        echo "version=$VERSION" >> $GITHUB_OUTPUT

    - name: Install Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: ${{ steps.flutter.outputs.version }}
        channel: stable
        cache: true

    - name: Flutter Info
      run: |

        flutter --version
        dart --version

    - name: Restore Session Backup
      run: |

        if [ -f session-backup.zip ]; then

          unzip -o session-backup.zip

          echo "Session restored"

        else

          echo "No session backup"

        fi

    - name: Install Package Dependencies
      run: |

        flutter clean
        
        # Install Flutter dependencies
        flutter pub get
        
        # If using Firebase
        if [ -f firebase.json ] || [ -f firebase_options.dart ]; then
          echo "Firebase detected, installing Firebase CLI"
          curl -sL https://firebase.tools | bash
        fi

    - name: Run Pre-build Scripts (if any)
      run: |
        # Check for package.json and run npm install
        if [ -f package.json ]; then
          echo "Running npm install..."
          npm install
        fi
        
        # Check for requirements.txt and run pip install
        if [ -f requirements.txt ]; then
          echo "Running pip install..."
          pip3 install -r requirements.txt
        fi
        
        # Check for setup.sh
        if [ -f setup.sh ]; then
          echo "Running setup.sh..."
          chmod +x setup.sh
          ./setup.sh
        fi

    - name: Auto Fix IconData
      run: |

        echo "Scanning IconData..."

        grep -rl "extends IconData" lib | while read file
        do

        echo "Fixing $file"

        sed -i \
        's/extends IconData/extends Object/g' \
        "$file"

        done

    - name: Run Tests (Optional)
      run: |
        if [ -d test ]; then
          flutter test
        else
          echo "No tests found, skipping"
        fi

    - name: Build APK
      run: |

        flutter build apk --release

    - name: Run Application (Test Run)
      run: |
        # Start the app in background to test
        timeout 30s flutter run --no-pub --release || true
        echo "Application test run completed"

    - name: Backup Session
      if: always()
      run: |

        zip -r session-backup.zip session 2>/dev/null || true

    - name: Upload Backup
      if: always()
      uses: actions/upload-artifact@v4
      with:

        name: session-backup
        path: session-backup.zip

    - name: Upload Built APK
      if: success()
      uses: actions/upload-artifact@v4
      with:

        name: flutter-apk
        path: build/app/outputs/flutter-apk/app-release.apk

    - name: Upload Build Logs
      if: always()
      uses: actions/upload-artifact@v4
      with:

        name: build-logs
        path: |
          build.log
          *.log
          !session-backup.zip

    - name: Compress Source Code
      if: success()
      run: |
        # Exclude unnecessary files
        zip -r bot-source.zip . \
          -x "*.git*" \
          -x "build/*" \
          -x "*.apk" \
          -x "*.zip" \
          -x "session-backup.zip" \
          -x "node_modules/*" \
          -x ".dart_tool/*" \
          -x "*.log"
        
        echo "Source code compressed"

    - name: Upload Bot Source Code
      if: success()
      uses: actions/upload-artifact@v4
      with:

        name: bot-source-code
        path: bot-source.zip
        if-no-files-found: ignore

    - name: Cleanup
      if: always()
      run: |
        # Clean up temporary files
        rm -rf extracted_bot
        rm -rf build/app/intermediates
        echo "Cleanup completed"
