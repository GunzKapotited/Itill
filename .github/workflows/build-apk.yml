name: Auto Build Flutter APK (Fix + Rename)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    # ==================== 1. EKSTRAK ZIP ====================
    - name: Extract ZIP
      run: |
        echo "📦 Extracting ZIP files..."
        for zip in *.zip; do
          [ -f "$zip" ] || continue
          unzip -q "$zip" -d project/
        done
        rm -rf project/__MACOSX 2>/dev/null || true
        echo "✅ Extraction complete"
        ls -la project/
    
    # ==================== 2. SETUP JAVA ====================
    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
    
    # ==================== 3. SETUP FLUTTER ====================
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.16.0'  # Versi paling stabil untuk kompatibilitas
        channel: 'stable'
    
    # ==================== 4. AUTO-FIX PUBSPEC.YAML ====================
    - name: Auto-Fix dependencies
      run: |
        cd project
        echo "🔧 Auto-fixing pubspec.yaml..."
        
        # Backup dulu
        cp pubspec.yaml pubspec.yaml.backup
        
        # Update semua package yang bermasalah
        sed -i 's/youtube_player_flutter: \^9.1.3/youtube_player_flutter: ^10.0.1/g' pubspec.yaml
        sed -i 's/youtube_player_flutter: \^9.1.4/youtube_player_flutter: ^10.0.1/g' pubspec.yaml
        sed -i 's/font_awesome_flutter: \^10.7.0/font_awesome_flutter: ^11.0.0/g' pubspec.yaml
        sed -i 's/font_awesome_flutter: \^10.8.0/font_awesome_flutter: ^11.0.0/g' pubspec.yaml
        sed -i 's/font_awesome_flutter: \^10.9.0/font_awesome_flutter: ^11.0.0/g' pubspec.yaml
        sed -i 's/socket_io_client: \^2.0.3/socket_io_client: ^3.1.6/g' pubspec.yaml
        sed -i 's/web_socket_channel: \^2.4.0/web_socket_channel: ^3.0.3/g' pubspec.yaml
        sed -i 's/intl: \^0.19.0/intl: ^0.20.2/g' pubspec.yaml
        sed -i 's/device_info_plus: \^10.1.0/device_info_plus: ^13.1.0/g' pubspec.yaml
        sed -i 's/device_info_plus: \^10.1.2/device_info_plus: ^13.1.0/g' pubspec.yaml
        sed -i 's/permission_handler: \^11.3.0/permission_handler: ^12.0.3/g' pubspec.yaml
        sed -i 's/video_player: \^2.8.6/video_player: ^2.11.1/g' pubspec.yaml
        sed -i 's/audioplayers: \^6.0.0/audioplayers: ^6.7.1/g' pubspec.yaml
        
        echo "✅ pubspec.yaml has been auto-fixed!"
        echo ""
        echo "📝 Changed packages:"
        grep -E "youtube_player_flutter|font_awesome_flutter|socket_io_client|intl|device_info_plus" pubspec.yaml || echo "No changes needed"
    
    # ==================== 5. DEPENDENCY CACHE ====================
    - name: Cache Flutter dependencies
      uses: actions/cache@v3
      with:
        path: |
          ~/.pub-cache
          project/.dart_tool
        key: ${{ runner.os }}-flutter-${{ hashFiles('project/pubspec.lock') }}
        restore-keys: |
          ${{ runner.os }}-flutter-
    
    # ==================== 6. INSTALL DEPENDENCIES ====================
    - name: Get dependencies
      run: |
        cd project
        flutter clean
        flutter pub get
    
    # ==================== 7. BUILD APK ====================
    - name: Build APK
      run: |
        cd project
        flutter build apk --release
      
    # ==================== 8. AUTO-RENAME APK ====================
    - name: Auto-Rename APK
      run: |
        cd project
        
        # Baca dari pubspec.yaml
        APP_NAME=$(grep '^name:' pubspec.yaml | head -1 | sed 's/name: //' | tr -d ' ' | tr -d '"' | tr -d "'")
        VERSION=$(grep '^version:' pubspec.yaml | head -1 | sed 's/version: //' | tr -d ' ' | tr -d '"' | tr -d "'")
        
        # Format tanggal dan waktu
        DATE=$(date +'%Y%m%d')
        TIME=$(date +'%H%M%S')
        RUN_NUM=${{ github.run_number }}
        
        # Bersihkan nama (hapus karakter aneh)
        CLEAN_NAME=$(echo "$APP_NAME" | sed 's/[^a-zA-Z0-9_-]//g')
        CLEAN_VERSION=$(echo "$VERSION" | sed 's/[^a-zA-Z0-9._-]//g')
        
        # Buat beberapa format nama
        FORMAT1="${CLEAN_NAME}_v${CLEAN_VERSION}_${DATE}_${TIME}.apk"
        FORMAT2="${CLEAN_NAME}_v${CLEAN_VERSION}_run${RUN_NUM}_${DATE}.apk"
        FORMAT3="${CLEAN_NAME}_${DATE}_${TIME}.apk"
        
        # Copy APK dengan nama baru
        cp build/app/outputs/flutter-apk/app-release.apk "../../${FORMAT1}"
        cp build/app/outputs/flutter-apk/app-release.apk "../../${FORMAT2}"
        
        echo "=========================================="
        echo "✅ BUILD SUCCESSFUL!"
        echo "=========================================="
        echo "📱 App Name: $CLEAN_NAME"
        echo "📌 Version: $CLEAN_VERSION"
        echo "📅 Date: $DATE"
        echo "🕐 Time: $TIME"
        echo "🔢 Run #: $RUN_NUM"
        echo ""
        echo "📦 APK Files created:"
        echo "   → $FORMAT1"
        echo "   → $FORMAT2"
        echo "=========================================="
        
        # Simpan nama untuk upload
        echo "APK_NAME=${FORMAT1}" >> $GITHUB_ENV
        echo "APK_NAME2=${FORMAT2}" >> $GITHUB_ENV
        
    # ==================== 9. UPLOAD APK ====================
    - name: Upload APK (Format 1 - Detail)
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.APK_NAME }}
        path: ${{ env.APK_NAME }}
    
    - name: Upload APK (Format 2 - Simple)
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.APK_NAME2 }}
        path: ${{ env.APK_NAME2 }}
    
    # ==================== 10. UPLOAD JIKA GAGAL BUILD ====================
    - name: Upload error log if build failed
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-error-log
        path: |
          project/build/
          project/.dart_tool/
          project/pubspec.yaml.backup
