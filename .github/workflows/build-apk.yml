name: Auto Build Flutter APK (Full Fix)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    # ==================== 1. EKSTRAK ZIP ====================
    - name: Extract ZIP
      run: |
        echo "📦 Extracting ZIP files..."
        for zip in *.zip; do
          [ -f "$zip" ] || continue
          unzip -q "$zip" -d project/
        done
        rm -rf project/__MACOSX 2>/dev/null || true
        echo "✅ Extraction complete"
    
    # ==================== 2. AUTO-FIX PUBSPEC.YAML (LENGKAP) ====================
    - name: Auto-Fix all dependencies
      run: |
        cd project
        echo "🔧 Auto-fixing pubspec.yaml..."
        
        # Backup dulu
        cp pubspec.yaml pubspec.yaml.bak
        
        # 1. FIX flutter_lints (turunkan versi atau comment)
        sed -i 's/flutter_lints: \^5.0.0/# flutter_lints: ^5.0.0/g' pubspec.yaml
        sed -i 's/flutter_lints: \^6.0.0/# flutter_lints: ^6.0.0/g' pubspec.yaml
        
        # 2. Update package yang bermasalah
        sed -i 's/youtube_player_flutter: \^9.1.3/youtube_player_flutter: ^10.0.1/g' pubspec.yaml
        sed -i 's/font_awesome_flutter: \^10.7.0/font_awesome_flutter: ^11.0.0/g' pubspec.yaml
        sed -i 's/font_awesome_flutter: \^10.8.0/font_awesome_flutter: ^11.0.0/g' pubspec.yaml
        sed -i 's/font_awesome_flutter: \^10.9.0/font_awesome_flutter: ^11.0.0/g' pubspec.yaml
        sed -i 's/socket_io_client: \^2.0.3/socket_io_client: ^3.1.6/g' pubspec.yaml
        sed -i 's/web_socket_channel: \^2.4.0/web_socket_channel: ^3.0.3/g' pubspec.yaml
        sed -i 's/intl: \^0.19.0/intl: ^0.20.2/g' pubspec.yaml
        sed -i 's/device_info_plus: \^10.1.0/device_info_plus: ^13.1.0/g' pubspec.yaml
        sed -i 's/permission_handler: \^11.3.0/permission_handler: ^12.0.3/g' pubspec.yaml
        sed -i 's/video_player: \^2.8.6/video_player: ^2.11.1/g' pubspec.yaml
        sed -i 's/audioplayers: \^6.0.0/audioplayers: ^6.7.1/g' pubspec.yaml
        
        echo "✅ pubspec.yaml auto-fixed!"
        echo ""
        echo "📝 Changes made:"
        cat pubspec.yaml | grep -E "flutter_lints|youtube_player|font_awesome" || echo "Done"
    
    # ==================== 3. SETUP JAVA ====================
    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
    
    # ==================== 4. SETUP FLUTTER (PAKAI YANG LEBIH BARU) ====================
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.22.0'  # Pakai yang lebih baru
        channel: 'stable'
    
    # ==================== 5. INSTALL DEPENDENCIES ====================
    - name: Get dependencies
      run: |
        cd project
        flutter clean
        flutter pub get --no-example
    
    # ==================== 6. BUILD APK ====================
    - name: Build APK
      run: |
        cd project
        flutter build apk --release
    
    # ==================== 7. AUTO-RENAME APK ====================
    - name: Auto-Rename APK
      run: |
        cd project
        
        # Baca dari pubspec.yaml
        APP_NAME=$(grep '^name:' pubspec.yaml | head -1 | sed 's/name: //' | tr -d ' ' | tr -d '"' | tr -d "'")
        VERSION=$(grep '^version:' pubspec.yaml | head -1 | sed 's/version: //' | tr -d ' ' | tr -d '"' | tr -d "'")
        DATE=$(date +'%Y%m%d')
        TIME=$(date +'%H%M%S')
        
        # Bersihkan nama
        CLEAN_NAME=$(echo "$APP_NAME" | sed 's/[^a-zA-Z0-9_-]//g')
        CLEAN_VERSION=$(echo "$VERSION" | sed 's/[^a-zA-Z0-9._-]//g')
        
        # Nama final
        FINAL_APK="${CLEAN_NAME}_v${CLEAN_VERSION}_${DATE}_${TIME}.apk"
        
        # Copy dan rename
        cp build/app/outputs/flutter-apk/app-release.apk "../../${FINAL_APK}"
        
        echo "=========================================="
        echo "✅ BUILD SUCCESSFUL!"
        echo "=========================================="
        echo "📱 App: $CLEAN_NAME"
        echo "📌 Version: $CLEAN_VERSION"
        echo "📦 APK: $FINAL_APK"
        echo "=========================================="
        
        echo "APK_NAME=${FINAL_APK}" >> $GITHUB_ENV
    
    # ==================== 8. UPLOAD APK ====================
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.APK_NAME }}
        path: ${{ env.APK_NAME }}
